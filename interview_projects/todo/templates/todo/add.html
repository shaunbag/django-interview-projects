{% extends 'todo/base.html' %}

{% block content %}
    <div class="header-container">
        <h2>Add New Todo</h2>
        <a href="/">Back to Todo List</a>
    </div>
    <div class="add-container">
        <form action="{% url 'add_todo' %}" method="POST">
            {% csrf_token %}
            {{ form }}
            <button type="submit">Add Todo</button>
        </form>
    </div>
{% endblock %}
